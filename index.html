<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odoo to Google Contacts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Dashboard zur Synchronisierung von Odoo Kontakten mit Google Contacts via n8n.">
</head>

<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="app-container">
    <header class="app-header">
      <div class="logo">
        <svg fill="currentColor" viewBox="0 0 24 24" class="logo-icon">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" />
          <path
            d="M11 19.93c-3.95-.49-7-3.85-7-7.93 0-1.46.39-2.82 1.07-4h13.86c.68 1.18 1.07 2.54 1.07 4 0 4.08-3.05 7.44-7 7.93v-2.02c2.81-.46 5-2.89 5-5.91h-12c0 3.02 2.19 5.45 5 5.91v2.02z" />
        </svg>
        <h1>SyncHub</h1>
      </div>
      <p class="subtitle">Odoo & Google Contacts Synchronisation</p>
    </header>

    <form id="sync-form" class="glass-panel">
      <!-- Odoo Section -->
      <section class="form-section">
        <div class="section-header">
          <span class="section-icon odoo-icon">O</span>
          <h2>Odoo Verbindungsdetails</h2>
        </div>
        <div class="input-grid">
          <div class="input-group full-width">
            <label for="odooUrl">Basis URL</label>
            <input type="url" id="odooUrl" placeholder="https://test-coolcooking.odoo.com" required>
          </div>
          <div class="input-group full-width">
            <label for="odooDatabase">Datenbank</label>
            <input type="text" id="odooDatabase" placeholder="odoo-db" required>
          </div>
          <div class="input-group full-width">
            <label for="odooPassword">Passwort / API Key</label>
            <input type="password" id="odooPassword" placeholder="••••••••••••" required>
          </div>
          <div class="input-group full-width">
            <label for="odooClientId">Client ID</label>
            <input type="text" id="odooClientId" placeholder="Deine Odoo Client ID" required>
          </div>
        </div>
      </section>

      <!-- Google Section -->
      <section class="form-section">
        <div class="section-header">
          <span class="section-icon google-icon">G</span>
          <h2>Google Authentifizierung</h2>
        </div>

        <div class="input-group full-width" style="margin-bottom: 1.5rem;">
          <button type="button" id="google-login-btn" class="secondary-btn google-btn">
            <svg class="google-svg" viewBox="0 0 24 24">
              <path fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
              <path fill="none" d="M1 1h22v22H1z" />
            </svg>
            Mit Google einloggen
          </button>
        </div>

        <input type="hidden" id="googleToken">
      </section>

      <!-- n8n Section -->
      <section class="form-section">
        <div class="section-header">
          <span class="section-icon n8n-icon">n</span>
          <h2>n8n Webhook</h2>
        </div>
        <div class="input-group full-width">
          <label for="webhookUrl">n8n Webhook URL</label>
          <input type="url" id="webhookUrl" value="https://coolcooking.app.n8n.cloud/webhook/synchub-trigger"
            placeholder="https://coolcooking.app.n8n.cloud/webhook/synchub-trigger" required>
          <p class="helper-text">Falls du in n8n auf "Test workflow" klickst, ändere oben einfach <code>/webhook/</code>
            zu <code>/webhook-test/</code>.</p>
        </div>
      </section>

      <div class="actions">
        <button type="submit" class="primary-btn" id="submit-btn">
          <span class="btn-text">Synchronisation starten</span>
          <div class="loader hidden"></div>
        </button>
      </div>

      <section class="errors-panel">
        <div class="section-header">
          <span class="section-icon error-icon">!</span>
          <h2>n8n Fehler</h2>
        </div>
        <div class="errors-action">
          <button type="button" id="load-errors-btn" class="secondary-btn">n8n Fehler laden</button>
          <button type="button" id="clear-errors-btn" class="secondary-btn">Fehler zurücksetzen</button>
        </div>
        <div id="errors-status" class="status-message hidden"></div>
        <div id="errors-list" class="errors-list hidden"></div>
      </section>

      <div id="status-message" class="status-message hidden"></div>
    </form>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="app.js"></script>
</body>

</html>
